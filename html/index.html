<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faizun_dev_02</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text-primary: #f0f0f5;
      --text-secondary: #6b6b80;
      --border: rgba(255, 255, 255, 0.06);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.3);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .project-name {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #f0f0f5 0%, #9090aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .project-name span {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .meta-value {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      font-family: 'Courier New', monospace;
    }

    .separator {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .card {
      margin-top: 4rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
      flex-shrink: 0;
    }

    .corner {
      position: fixed;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      color: var(--text-secondary);
      opacity: 0.4;
      letter-spacing: 0.08em;
    }

    .corner-tl { top: 1.5rem; left: 1.5rem; }
    .corner-tr { top: 1.5rem; right: 1.5rem; }
    .corner-bl { bottom: 1.5rem; left: 1.5rem; }
    .corner-br { bottom: 1.5rem; right: 1.5rem; }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <span class="corner corner-tl">v2.0.0</span>
  <span class="corner corner-tr">DEV</span>
  <span class="corner corner-bl">© 2024</span>
  <span class="corner corner-br">0x02</span>

  <div class="container">

    <div class="badge">Project Active</div>

    <h1 class="project-name">
      faizun<span>_dev</span>_02
    </h1>

    <p class="subtitle">
      A clean, focused development environment. Minimal by design, powerful by intent.
    </p>

    <div class="divider"></div>

    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-label">Project</span>
        <span class="meta-value">faizun_dev_02</span>
      </div>
      <div class="separator"></div>
      <div class="meta-item">
        <span class="meta-label">Build</span>
        <span class="meta-value">#002</span>
      </div>
      <div class="separator"></div>
      <div class="meta-item">
        <span class="meta-label">Status</span>
        <span class="meta-value">Running</span>
      </div>
    </div>

    <div class="card">
      <div class="card-dot"></div>
      System online — ready for development
    </div>

  </div>

</body>
</html>
